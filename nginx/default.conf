server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html index.php;  # сначала ищем index.html, потом index.php

    client_max_body_size 200M;

    location / {
        try_files $uri $uri/ /index.html?$query_string;  # если файл не найден - отдаём index.html
    }

    # любой запрос на .php файл пересылаем в php-fpm
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
